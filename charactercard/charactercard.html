<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="BYUI Mission Statement">
        <meta name="author" content="Connor Sanderson">
        <title>Character Card</title>
        <link rel="stylesheet" href="charactercard.css">
        <script src="charactercard.js" defer></script>
    </head>
    <body>
        <header></header>

        <main>
            <div class="card">
                <img class="image">

                <h1 class="name"></h1>

                <div class="stats">
                    <p class="class"></p>
                    <p class="level"></p>
                    <p class="health"></p>
                </div>

                <div class="buttons">
                    <button class="attacked">Attacked</button>
                    <button class="levelUp">Level Up</button>
                </div>
            </div>
        </main>

        <footer></footer>
        
    </body>
</html>
