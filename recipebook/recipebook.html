<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RecipeBook</title>
    <link rel="stylesheet" href="recipebook.css">
    <script src="recipebook.js" defer></script>
    
    <!-- Open Graph (Facebook, LinkedIn, etc.) -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="RecipeBook">
    <meta property="og:description" content="A place to hold all your recipes">
    <meta property="og:url" content="Your URL">
    <meta property="og:image" content="social-preview-image.png">

    <!-- X Card -->
    <meta name="twitter:card" content="Social Preview Image">
    <meta name="twitter:title" content="RecipeBook">
    <meta name="twitter:description" content="A place to hold all your recipes">
    <meta name="twitter:image" content="social-preview-image.png">

    <!-- One favicon (ICO works everywhere) -->
    <link rel="icon" href="/favicon.ico">

    <!-- One Apple Touch Icon (iOS home screen) -->
    <link rel="apple-touch-icon" href="images/apple-touch-icon.png">
</head>
<body>
    <div class="wrapper">
        <header>
            <div id="brand-name">
                <img id="logo" src="images/recipe-book.png" alt="RecipeBook logo">

                <h1 id="title">RecipeBook</h1>
            </div>
            <form action="search" class="search">
                <input type="search" id="search-bar" placeholder="Search...">
                <button type="submit" class="search-btn">
                    <img src="images/search.svg" alt="search image">
                </button>
            </form>
        </header>
        <hr class="divider">
        <main>
            <section class="recipe-card">
                <img src="images/apple-crisp.jpg" alt="Apple Crisp" class="recipe-img">
                <div class="recipe-info">
                    <span class="tag">dessert</span>

                    <h2>APPLE CRISP</h2>
                    <span
                        class="rating"
                        role="img"
                        aria-label="Rating: 4 out of 5 stars"
                    >
                        <span aria-hidden="true" class="icon-star">⭐</span>
                        <span aria-hidden="true" class="icon-star">⭐</span>
                        <span aria-hidden="true" class="icon-star">⭐</span>
                        <span aria-hidden="true" class="icon-star">⭐</span>
                        <span aria-hidden="true" class="icon-star-empty">☆</span>
                    </span>
                    <p class="description">
                        This apple crisp recipe is a simmple yet delicious fall dessert that's great served warm 
                        with vanilla ice cream
                    </p>
                </div>
            </section>     
        </main>

        <footer>
            <div class="social-links">
                <a href="#" class="social-icon">
                    <img src="images/instagram_icon.svg" alt="instagram icon">
                </a>
                <a href="#" class="social-icon">
                    <img src="images/youtube_icon.svg" alt="youtube icon">
                </a>
                <a href="#" class="social-icon">
                    <img src="images/pinterest_icon.svg" alt="pintrest icon">
                </a>
            </div>

            <a href="https://www.flaticon.com/free-icons/recipe" title="recipe icons">Recipe icons created by Freepik - Flaticon</a>                   
                    
        </footer>
    </div>
</body>
</html>
